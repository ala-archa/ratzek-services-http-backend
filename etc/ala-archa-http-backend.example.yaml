---

log_level: Info

ipset_shaper_name: shaper
ipset_acl_name: acl
http_listen: 0.0.0.0:8888
bytes_unlimited_limit: 5000000

ping:
  server: 1.1.1.1
  crontab: "0 * * * * *"
speedtest:
  speedtest_cli_path: /usr/local/bin/speedtest
  crontab: "0 15 */8 * * *"

dhcpd_leases: /var/lib/dhcp/dhcpd.leases

# DHCP server flavor for the lease/reservation integration. `auto` (default) detects
# the active daemon (dnsmasq vs isc-dhcp-server) at startup; leave unset to auto-detect
# (stays ISC until dnsmasq becomes the active daemon).
# dhcp_flavor: auto            # auto | isc | dnsmasq
# Lease length in seconds — only used to approximate `last_seen` under dnsmasq (whose
# lease file lacks a client-last-transaction timestamp). Match the server's lease time.
# dhcp_lease_secs: 43200

persistent_state_path: /var/tmp/ala-archa-http-backend.state

# Admin panel credentials (optional). Generate password_hash with:
#   ala-archa-http-backend hash-password 'your-password'
# Keep this config readable only by its owner (mode 0600).
# admin:
#   login: admin
#   password_hash: "$argon2id$v=19$m=19456,t=2,p=1$c29tZXNhbHQ$..."
#   # Set Secure flag on the session cookie. Keep true in production (TLS).
#   # Set false only for local http testing.
#   cookie_secure: true

# Unlimited-clients management (admin CRUD). Optional; required only for the
# /api/v1/admin/unlimited-clients endpoints and startup reconcile.
#
# File the backend owns and rewrites; it replaces hand-edited no_shaping_ips.
unlimited_clients_path: /var/lib/ala-archa-http-backend/unlimited-clients.yaml
# CIDR an admin may pick unlimited-client IPs from (must have an active lease).
unlimited_subnet: "10.11.5.0/24"
# MAC blacklist (admin CRUD via /api/v1/admin/blacklist). The backend owns and
# rewrites this file; entries are checked in UNION with the static
# `blacklisted_macs` below. Optional (defaults to this path).
blacklist_path: /var/lib/ala-archa-http-backend/blacklist.yaml
# dhcp_reservations: how the backend manages dhcpd `host` reservations for
# unlimited clients. It owns the include file below (reference it from dhcpd.conf
# with `include "/etc/dhcp/unlimited-hosts.conf";`), regenerates it from the store
# on every CRUD change and on startup, validates with `dhcpd -t`, then restarts
# dhcpd. The backend must run as root. Omit this section to disable reservation
# management (then admin CRUD POST returns 500).
# dhcp_reservations:
#   include_path: /etc/dhcp/unlimited-hosts.conf      # absolute; backend owns/rewrites it
#   validate_command: "dhcpd -t"                       # must fail on an invalid config
#   reload_command: "systemctl restart isc-dhcp-server"
#   # --- ISC→dnsmasq migration knobs (both optional; unset = current ISC behaviour) ---
#   # active_unit: if set, apply() verifies this unit is `is-active` BEFORE reload and
#   # skips the reload when it's down (so a stale reconcile can't revive a stopped
#   # dhcpd during cutover). Set to isc-dhcp-server while arming the cutover.
#   # active_unit: isc-dhcp-server
#   # reload_log: under dnsmasq, `validate` (dnsmasq --test) can NOT catch a bad
#   # reservation line, so after reload the backend scrapes the daemon log; a match
#   # rolls the hostsfile fully back. Requires `log-dhcp` + `log-facility=<file>` in
#   # dnsmasq.conf. Under dnsmasq set include_path->hostsfile, validate_command->
#   # "dnsmasq --test -C /etc/ratzek-dnsmasq.conf", reload_command->"systemctl reload dnsmasq-ratzek".
#   # reload_log:
#   #   file: /var/log/ratzek-dnsmasq.log   # absolute; the dnsmasq log-facility target
#   #   success_contains: "read"            # marks reload completion (default)
#   #   error_contains: "at line"           # a hostsfile line with this = rejected (default)
#   #   timeout_secs: 3                      # bounded scrape poll (default)

# device_metrics: optional per-device metrics (first/last seen, accumulated traffic,
# IP history) sampled periodically from dhcpd leases + ipset counters into SQLite and
# surfaced in the admin API (GET /api/v1/admin/devices, and extra fields on
# unlimited-clients). Best-effort: a DB error disables metrics but never blocks the
# backend. Omit to disable. Back up the .sqlite file before upgrades.
# device_metrics:
#   db_path: /var/lib/ala-archa-http-backend/device-metrics.sqlite   # absolute
#   crontab: "0 */5 * * * *"     # 6-field cron; every 5 min (spare SD-card writes)
#   retention_days: 730          # drop daily traffic buckets / IP history older than this
#   retention_hourly_days: 90    # drop hourly traffic buckets older than this (optional)
#   retention_5min_hours: 48     # drop 5-minute traffic buckets older than this (optional)

# history: optional WAN history + event log. Persists periodic speedtest/balance
# readings and notable events (internet up/down, low balance, new device, blacklist
# add/remove, disconnect) into a SQLite DB; surfaced at GET /api/v1/admin/wan/* and
# GET /api/v1/admin/events. Best-effort: a DB error disables it but never blocks the
# backend. Omit to disable (those endpoints then return 404). `new_device` events
# additionally require `device_metrics` to be enabled.
# history:
#   db_path: /var/lib/ala-archa-http-backend/history.sqlite   # absolute
#   retention_days: 90           # drop WAN readings / events older than this

telegram:
  bot_token: "123456:ABC-asdasdasdasd"
  retry_crontab: "30 */5 * * * *"
  message_timeout: 24h

mobile_provider:
  update_tariff_command: |
    ssh ratzek-services@10.11.1.1 '/interface lte at-chat lte1 wait=yes input="AT+CUSD=1,\"*255#\",15"'
  # Перед работой, необходимой переключить Ошку в режим английского языка:
  # ssh ratzek-services@10.11.1.1 '/interface lte at-chat lte1 wait=yes input="AT+CUSD=1,\"*177*3#\",15"'
  get_balance_command: |
    ssh ratzek-services@10.11.1.1 '/interface lte at-chat lte1 wait=yes input="AT+CUSD=1,\"*100#\",15"'
  get_balance_crontab: "0 20 13 * * *"
  low_balance_threshold: 1200
  low_download_speed_threshold: 1000000
  min_update_tariff_interval: 1w
  telegram_chat_ids:
    - "123456789"
    - "-100987654321"
  phone_number: '+996 702 457 912'
  get_balance_retry_count: 3
  get_balance_retry_interval: 5s
  restart_lte_command: |
    ssh ratzek-services@10.11.1.1 '/interface disable lte1; delay 10; /interface enable lte1; delay 10'
